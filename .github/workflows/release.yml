name: Release

# Push a version tag (e.g. v1.1.0) to build a signed ZXP and publish a GitHub
# Release with it attached. Runs on macOS because Adobe's ZXPSignCmd ships a
# macOS binary we can fetch and run directly.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(cat VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION ($file)"; exit 1
          fi
          npm run set-version:check

      - name: Lint and test
        run: |
          npm run lint
          npm test

      - name: Fetch ZXPSignCmd
        run: |
          curl -fsSL -o "$RUNNER_TEMP/ZXPSignCmd" \
            "https://raw.githubusercontent.com/Adobe-CEP/CEP-Resources/master/ZXPSignCMD/4.1.3/macOS/ZXPSignCmd"
          chmod +x "$RUNNER_TEMP/ZXPSignCmd"

      - name: Build signed ZXP
        env:
          ZXPSIGNCMD: ${{ runner.temp }}/ZXPSignCmd
        run: npm run build:zxp

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.zxp --generate-notes --title "$GITHUB_REF_NAME"
