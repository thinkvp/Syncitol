name: UXP CI

on:
  push:
    branches: [main]
    paths: ['uxp/**', '.github/workflows/uxp-ci.yml']
  pull_request:
    paths: ['uxp/**', '.github/workflows/uxp-ci.yml']

defaults:
  run:
    working-directory: uxp

jobs:
  verify:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Syntax check
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: CEP ↔ UXP version sync
        shell: bash
        run: |
          uxp_ver="$(node -p "require('./manifest.json').version")"
          cep_ver="$(cat ../cep/VERSION)"
          if [ "$uxp_ver" != "$cep_ver" ]; then
            echo "UXP version ($uxp_ver) != CEP version ($cep_ver) — keep them in sync."
            exit 1
          fi
          echo "UXP & CEP both at $uxp_ver ✓"
