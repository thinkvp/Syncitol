name: UXP Release

# Push a tag like uxp-v1.0.1 to build the .ccx package and publish (or attach
# to) a GitHub Release. No signing step — independent (non-Marketplace) .ccx
# distribution doesn't require Adobe Developer Distribution portal signing.
on:
  push:
    tags: ['uxp-v*']

permissions:
  contents: write

defaults:
  run:
    working-directory: uxp

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check tag matches manifest.json
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#uxp-v}"
          file="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$file" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest.json version ($file)"; exit 1
          fi

      - name: Lint, test, build
        run: |
          npm run lint
          npm test
          npm run build

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        # Creating a release in the GitHub UI also pushes the tag, which triggers
        # this workflow — so the release may already exist (with hand-written
        # notes) by the time we get here. In that case just attach the asset.
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.ccx --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.ccx --generate-notes --title "Syncitol UXP $GITHUB_REF_NAME"
          fi
