name: CEP Release

# Push a tag like v1.0.1 to build a signed ZXP and a Windows installer,
# then publish (or attach to) a GitHub Release alongside the UXP artifacts.
#
# You can also trigger the ZXP build manually via the Actions tab — useful
# for attaching a missing ZXP to an existing release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to attach to (e.g. v1.1.0)'
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    working-directory: cep

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check tag matches VERSION
        # Skip tag check for manual runs — we trust the user's input.
        if: github.event_name != 'workflow_dispatch'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(cat VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION ($file)"; exit 1
          fi
      - name: Lint, test, version consistency
        if: github.event_name != 'workflow_dispatch'
        run: |
          npm run lint
          npm test
          npm run set-version:check
      - name: CEP ↔ UXP version sync
        shell: bash
        run: |
          cep_ver="$(cat VERSION)"
          uxp_ver="$(node -p "require('../uxp/manifest.json').version")"
          if [ "$cep_ver" != "$uxp_ver" ]; then
            echo "CEP version ($cep_ver) != UXP version ($uxp_ver) — keep them in sync."
            exit 1
          fi
          echo "CEP & UXP both at $cep_ver ✓"

  build-zxp:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch ZXPSignCmd
        run: |
          curl -fsSL -o "$RUNNER_TEMP/ZXPSignCmd" \
            "https://raw.githubusercontent.com/Adobe-CEP/CEP-Resources/master/ZXPSignCMD/4.1.3/macOS/ZXPSignCmd"
          chmod +x "$RUNNER_TEMP/ZXPSignCmd"

      - name: Build signed ZXP
        env:
          ZXPSIGNCMD: ${{ runner.temp }}/ZXPSignCmd
        run: npm run build:zxp

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # On tag push we use GITHUB_REF_NAME; on manual dispatch we use the input.
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        # Creating a release in the GitHub UI also pushes the tag, which triggers
        # this workflow — so the release may already exist (with hand-written
        # notes) by the time we get here. In that case just attach the asset.
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.zxp --clobber
          else
            gh release create "$RELEASE_TAG" dist/*.zxp --generate-notes --title "Syncitol $RELEASE_TAG"
          fi

  build-installer:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Stage runtime files
        run: node scripts/stage.js

      - name: Build installer
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\syncitol-cep-installer.iss /DMyAppVersion=$version

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.exe --clobber
          else
            gh release create "$RELEASE_TAG" dist/*.exe --generate-notes --title "Syncitol $RELEASE_TAG"
          fi
