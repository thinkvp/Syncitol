name: CEP Release

# Push a tag like cep-v1.0.1 to build a signed ZXP and a Windows installer,
# then publish (or attach to) a GitHub Release.
on:
  push:
    tags: ['cep-v*']

permissions:
  contents: write

defaults:
  run:
    working-directory: cep

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#cep-v}"
          file="$(cat VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION ($file)"; exit 1
          fi
      - name: Lint, test, version consistency
        run: |
          npm run lint
          npm test
          npm run set-version:check

  build-zxp:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch ZXPSignCmd
        run: |
          curl -fsSL -o "$RUNNER_TEMP/ZXPSignCmd" \
            "https://raw.githubusercontent.com/Adobe-CEP/CEP-Resources/master/ZXPSignCMD/4.1.3/macOS/ZXPSignCmd"
          chmod +x "$RUNNER_TEMP/ZXPSignCmd"

      - name: Build signed ZXP
        env:
          ZXPSIGNCMD: ${{ runner.temp }}/ZXPSignCmd
        run: npm run build:zxp

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # Creating a release in the GitHub UI also pushes the tag, which triggers
        # this workflow — so the release may already exist (with hand-written
        # notes) by the time we get here. In that case just attach the asset.
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.zxp --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.zxp --generate-notes --title "Syncitol CEP $GITHUB_REF_NAME"
          fi

  build-installer:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Stage runtime files
        run: node scripts/stage.js

      - name: Build installer
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\syncitol-cep-installer.iss /DMyAppVersion=$version

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.exe --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.exe --generate-notes --title "Syncitol CEP $GITHUB_REF_NAME"
          fi
